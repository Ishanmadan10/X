name: CI-CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ---------------------------
    # Set image tag (short SHA)
    # ---------------------------
    - name: Set IMAGE TAG
      run: echo "TAG=${GITHUB_SHA::8}" >> $GITHUB_ENV

    # ---------------------------
    # Docker login
    # ---------------------------
    - name: Docker login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # ---------------------------
    # Build images
    # ---------------------------
    - name: Build backend image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${TAG} ./backend

    - name: Build frontend image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${TAG} ./frontend

    # ---------------------------
    # Push images
    # ---------------------------
    - name: Push backend image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${TAG}

    - name: Push frontend image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${TAG}

    # ---------------------------
    # Update Kubernetes YAML
    # ---------------------------
    - name: Update Kubernetes manifests
      run: |
        sed -i "s|__BACKEND_IMAGE__|${{ secrets.DOCKER_USERNAME }}/backend:${TAG}|g" k8s/backend.yaml
        sed -i "s|__FRONTEND_IMAGE__|${{ secrets.DOCKER_USERNAME }}/frontend:${TAG}|g" k8s/frontend.yaml

