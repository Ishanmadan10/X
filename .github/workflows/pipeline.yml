name: CI-CD

on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    # Login to Docker Hub
    - name: Docker login
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # Build images with UNIQUE TAG (VERY IMPORTANT)
    - name: Build backend image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }} ./backend

    - name: Build frontend image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }} ./frontend

    # Push images
    - name: Push backend image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/backend:${{ github.sha }}

    - name: Push frontend image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/frontend:${{ github.sha }}

